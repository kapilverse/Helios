<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #38bdf8; }
        .status { padding: 0.5rem; margin-bottom: 1rem; border-radius: 4px; font-size: 0.875rem; }
        .status.connected { background: #064e3b; color: #6ee7b7; }
        .status.disconnected { background: #7f1d1d; color: #fca5a5; }
        .status.syncing { background: #78350f; color: #fbbf24; }
        #editor {
            width: 100%;
            min-height: 400px;
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
            font-family: 'SF Mono', monospace;
            font-size: 14px;
            resize: vertical;
            outline: none;
        }
        #editor:focus { border-color: #38bdf8; }
        .peers { margin-top: 1rem; font-size: 0.875rem; color: #94a3b8; }
        .peer { display: inline-block; margin-right: 0.5rem; padding: 0.25rem 0.5rem; background: #334155; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>HELIOS</h1>
        <div id="status" class="status disconnected">Disconnected</div>
        <textarea id="editor" placeholder="Start typing..."></textarea>
        <div class="peers" id="peers"></div>
    </div>
    <script>
        const editor = document.getElementById('editor');
        const statusEl = document.getElementById('status');
        const peersEl = document.getElementById('peers');

        let ws;
        let peerId = null;
        let syncSeq = 0;

        function setStatus(text, cls) {
            statusEl.textContent = text;
            statusEl.className = 'status ' + cls;
        }

        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws`);

            ws.onopen = () => {
                setStatus('Connected', 'connected');
                ws.send(JSON.stringify({ Join: { document_id: 'default' } }));
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                if (msg.Sync) {
                    const resp = msg.Sync.response;
                    syncSeq = resp.current_seq;

                    // Apply any missed ops
                    if (resp.ops) {
                        for (const [seq, op] of resp.ops) {
                            applyOp(op);
                            syncSeq = Math.max(syncSeq, seq);
                        }
                    }
                } else if (msg.Op) {
                    applyOp(msg.Op.op);
                    syncSeq = msg.Op.seq;
                } else if (msg.Presence) {
                    updatePeers(msg.Presence.peers);
                }
            };

            ws.onclose = () => {
                setStatus('Disconnected — reconnecting...', 'disconnected');
                setTimeout(connect, 2000);
            };

            ws.onerror = () => {
                setStatus('Error', 'disconnected');
            };
        }

        function applyOp(op) {
            if (op.Insert) {
                // For now, just append to editor
                // TODO: Position-based insert using OpId
            } else if (op.Delete) {
                // TODO: Remove character by OpId
            }
        }

        function updatePeers(peers) {
            peersEl.innerHTML = peers.map(p =>
                `<span class="peer" style="border-left: 3px solid ${p.color}">${p.name}</span>`
            ).join('');
        }

        editor.addEventListener('input', (e) => {
            if (ws && ws.readyState === WebSocket.OPEN && e.data) {
                ws.send(JSON.stringify({
                    Op: {
                        op: {
                            Insert: {
                                id: { peer: peerId || crypto.randomUUID(), clock: Date.now() },
                                after: null,
                                content: e.data
                            }
                        }
                    }
                }));
            }
        });

        connect();
    </script>
</body>
</html>
