<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #38bdf8; }
        .status { padding: 0.5rem; margin-bottom: 1rem; border-radius: 4px; font-size: 0.875rem; }
        .status.connected { background: #064e3b; color: #6ee7b7; }
        .status.disconnected { background: #7f1d1d; color: #fca5a5; }
        #editor {
            width: 100%;
            min-height: 400px;
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
            font-family: 'SF Mono', monospace;
            font-size: 14px;
            resize: vertical;
            outline: none;
        }
        #editor:focus { border-color: #38bdf8; }
        .peers { margin-top: 1rem; font-size: 0.875rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>HELIOS</h1>
        <div id="status" class="status disconnected">Disconnected</div>
        <textarea id="editor" placeholder="Start typing..."></textarea>
        <div class="peers" id="peers"></div>
    </div>
    <script>
        const editor = document.getElementById('editor');
        const statusEl = document.getElementById('status');
        const peersEl = document.getElementById('peers');

        let ws;
        let peerId = crypto.randomUUID();

        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws`);

            ws.onopen = () => {
                statusEl.textContent = 'Connected';
                statusEl.className = 'status connected';
                ws.send(JSON.stringify({ Join: { document_id: 'default' } }));
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.Op) {
                    // Another client's op — could apply to editor
                } else if (msg.Sync) {
                    // Initial sync
                }
            };

            ws.onclose = () => {
                statusEl.textContent = 'Disconnected — reconnecting...';
                statusEl.className = 'status disconnected';
                setTimeout(connect, 2000);
            };
        }

        editor.addEventListener('input', (e) => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    Op: {
                        Insert: {
                            id: { peer: peerId, clock: Date.now() },
                            after: null,
                            content: e.data || ''
                        }
                    }
                }));
            }
        });

        connect();
    </script>
</body>
</html>
